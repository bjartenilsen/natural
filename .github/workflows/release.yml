name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
      version: ${{ steps.get_version.outputs.VERSION }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract changelog for this version
            sed -n "/## \[${{ steps.get_version.outputs.VERSION }}\]/,/## \[/p" CHANGELOG.md | sed '$d' > release_notes.md
          else
            echo "# Natural Wine Detector ${{ steps.get_version.outputs.VERSION }}" > release_notes.md
            echo "" >> release_notes.md
            echo "## 🍷 Features" >> release_notes.md
            echo "- AI-powered natural wine detection using ChatGPT image analysis" >> release_notes.md
            echo "- Camera integration for wine bottle photography" >> release_notes.md
            echo "- Local SQLite database for wine history" >> release_notes.md
            echo "- Location tagging for wine discoveries" >> release_notes.md
            echo "- Personal wine journal with notes and consumption tracking" >> release_notes.md
            echo "" >> release_notes.md
            echo "## 📱 Installation" >> release_notes.md
            echo "Download the appropriate file for your device:" >> release_notes.md
            echo "- **Android**: Download \`natural-wine-detector-android.apk\`" >> release_notes.md
            echo "- **iOS**: Download \`natural-wine-detector-ios.ipa\` (requires developer installation)" >> release_notes.md
            echo "" >> release_notes.md
            echo "## 🔧 Requirements" >> release_notes.md
            echo "- OpenAI API key for wine analysis" >> release_notes.md
            echo "- Camera permissions" >> release_notes.md
            echo "- Location permissions (optional)" >> release_notes.md
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Natural Wine Detector ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: NaturalWineDetector/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./NaturalWineDetector
        run: npm install --legacy-peer-deps

      - name: Build Android APK
        working-directory: ./NaturalWineDetector
        run: |
          echo "Building Android APK for release..."
          eas build --platform android --profile production --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download Android APK
        working-directory: ./NaturalWineDetector
        run: |
          echo "Downloading built APK..."
          BUILD_ID=$(eas build:list --platform android --status finished --limit 1 --json | jq -r '.[0].id')
          echo "Latest build ID: $BUILD_ID"
          eas build:download --id $BUILD_ID --output ./natural-wine-detector-android.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload Android APK to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: ./NaturalWineDetector/natural-wine-detector-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: create-release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: NaturalWineDetector/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./NaturalWineDetector
        run: npm install --legacy-peer-deps

      - name: Build iOS IPA
        working-directory: ./NaturalWineDetector
        run: |
          echo "Building iOS IPA for release..."
          eas build --platform ios --profile production --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download iOS IPA
        working-directory: ./NaturalWineDetector
        run: |
          echo "Downloading built IPA..."
          BUILD_ID=$(eas build:list --platform ios --status finished --limit 1 --json | jq -r '.[0].id')
          echo "Latest build ID: $BUILD_ID"
          eas build:download --id $BUILD_ID --output ./natural-wine-detector-ios.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload iOS IPA to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: ./NaturalWineDetector/natural-wine-detector-ios.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}