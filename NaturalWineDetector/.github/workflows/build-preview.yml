name: Build Preview (EAS Build)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Submit
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "⚠️  EXPO_TOKEN secret not found. EAS builds will be skipped."
            echo "To enable builds, add an EXPO_TOKEN secret to this repository."
            echo "Learn more: https://docs.expo.dev/eas-update/github-actions"
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
          else
            echo "✅ EXPO_TOKEN found. Builds will proceed."
            echo "SKIP_BUILD=false" >> $GITHUB_ENV
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Verify Node.js version
        run: |
          echo "Node.js version: $(node --version)"
          npm run check-node

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run type-check

      - name: Run ESLint
        run: npm run lint

      - name: Setup EAS CLI
        if: env.SKIP_BUILD == 'false'
        run: |
          npm install -g @expo/cli@latest eas-cli@latest
          echo "EAS CLI version: $(eas --version)"
          echo "Expo CLI version: $(npx expo --version)"

      - name: Authenticate with Expo
        if: env.SKIP_BUILD == 'false'
        run: |
          echo "Authenticating with Expo..."
          eas login --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        if: env.SKIP_BUILD == 'false'
        run: eas build --platform android --profile preview --non-interactive --no-wait

      - name: Build iOS (if needed)
        if: env.SKIP_BUILD == 'false' && false  # Set second condition to true when you want to build iOS
        run: eas build --platform ios --profile preview --non-interactive --no-wait